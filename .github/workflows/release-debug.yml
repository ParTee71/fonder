name: Debug Release Build

# Bygger en debug-signerad APK (Androids auto-genererade debug-nyckel) och publicerar
# den som en GitHub Release. Kräver inga signeringssecrets — använd tills en riktig
# release-keystore finns (se release.yml). Debug-APK:er är inte avsedda för Play Store.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 0.1.0-debug) — leave blank to use value in build.gradle.kts'
        required: false
        type: string

permissions:
  contents: write   # required to create a GitHub Release

jobs:
  release-debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            ./gradlew :app:assembleDebug \
              -PversionNameOverride="${{ inputs.version_name }}"
          else
            ./gradlew :app:assembleDebug
          fi

      - name: Determine release tag
        id: tag
        run: |
          VERSION="${{ inputs.version_name }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -oP 'versionName\s*=\s*versionNameOverride\s*\?:\s*"\K[^"]+' app/build.gradle.kts)
          fi
          echo "tag=debug-v${VERSION}-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fonder-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Publish GitHub Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          name: Fonder ${{ steps.tag.outputs.tag }} (debug)
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/debug/*.apk
          body: |
            Debug-signerad byggning (Androids auto-genererade debug-nyckel).
            **Inte** avsedd för Play Store eller produktion — installera direkt för test.
