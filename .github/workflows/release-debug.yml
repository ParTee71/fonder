name: Debug Snapshot Build

# Bygger en debug-signerad APK (fast debug.keystore, se app/debug.keystore) och
# publicerar den som en ENDA rullande "snapshot"-release (taggen debug-snapshot).
# Varje körning skriver över föregående i stället för att skapa en ny versionstaggad
# release — dev-byggen är många och behöver inte en egen version var. Kräver inga
# signeringssecrets — använd tills en riktig release-keystore finns (se release.yml).
# Debug-APK:er är inte avsedda för Play Store.

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name att bygga med (visas i appen, t.ex. i Inställningar) — lämna tomt för värdet i build.gradle.kts'
        required: false
        type: string

permissions:
  contents: write   # required to create/replace a GitHub Release

jobs:
  release-debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          if [ -n "${{ inputs.version_name }}" ]; then
            ./gradlew :app:assembleDebug \
              -PversionNameOverride="${{ inputs.version_name }}"
          else
            ./gradlew :app:assembleDebug
          fi

      - name: Determine snapshot label
        id: snapshot
        run: |
          echo "label=$(date -u +'%Y-%m-%d %H:%M UTC') · ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Remove previous snapshot release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete debug-snapshot --yes --cleanup-tag || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fonder-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Publish GitHub Release (rolling snapshot)
        uses: softprops/action-gh-release@v2
        with:
          name: Fonder debug-snapshot (${{ steps.snapshot.outputs.label }})
          tag_name: debug-snapshot
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk
          body: |
            Rullande debug-snapshot — skrivs över vid varje ny körning, taggen pekar alltid
            på det senaste bygget. Debug-signerad med den fasta `app/debug.keystore` (samma
            nyckel varje gång, går alltid att installera som uppgradering av föregående).
            **Inte** avsedd för Play Store eller produktion — installera direkt för test.

            Byggd från: ${{ github.sha }}
