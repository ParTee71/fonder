name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile debug Kotlin
        run: ./gradlew :app:compileDebugKotlin

      - name: Compile debug unit test Kotlin
        run: ./gradlew :app:compileDebugUnitTestKotlin

      - name: Compile debug Android test Kotlin
        run: ./gradlew :app:compileDebugAndroidTestKotlin

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/testDebugUnitTest/

  cancel-instrumented-on-failure:
    needs: build-and-test
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Cancel in-progress Instrumented Tests run
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: context.sha,
            });
            for (const run of data.workflow_runs) {
              if (run.name === 'Instrumented Tests' && ['queued', 'in_progress'].includes(run.status)) {
                await github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              }
            }
